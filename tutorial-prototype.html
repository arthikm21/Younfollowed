<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YOUnfollowed — Export Tutorial (modal prototype)</title>
<style>
  :root{
    --accent:#0071e3;
    --ig-bg:#0b0b0c;
    --ig-card:#1c1c1e;
    --ig-sub:#a8a8a8;
    --hi:#0071e3;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%,#fafafa 0%,#eef0f3 60%);
    color:#1d1d1f;min-height:100dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;padding:26px 16px;
  }
  .head{text-align:center;max-width:430px;}
  .head h1{font-size:20px;font-weight:600;letter-spacing:-.4px;margin-bottom:6px;}
  .head p{font-size:13px;color:#6e6e73;line-height:1.5;}

  /* phone (the app) */
  .phone{position:relative;width:393px;max-width:100%;flex-shrink:0;
    background:#1d1d1f;border-radius:56px;padding:12px;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.5);}
  .island{position:absolute;top:14px;left:50%;transform:translateX(-50%);
    width:118px;height:33px;background:#000;border-radius:20px;z-index:100;}
  .screen{position:relative;background:#0b0b0c;border-radius:44px;overflow:hidden;
    height:812px;display:flex;flex-direction:column;}

  /* dimmed app backdrop behind the modal */
  .backdrop{position:absolute;inset:0;background:rgba(8,8,10,.72);backdrop-filter:blur(3px);z-index:10;}
  .app-faint{position:absolute;inset:0;padding:70px 26px;color:#2a2a2e;}
  .app-faint .ttl{font-size:26px;font-weight:700;color:#3a3a40;}
  .app-faint .box{margin-top:26px;height:150px;border:2px dashed #2c2c31;border-radius:20px;}

  /* ===== the squircle modal ===== */
  .modal{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:330px;max-width:88%;
    background:#fff;border-radius:34px;z-index:20;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.55);
    overflow:hidden;display:flex;flex-direction:column;
  }
  .progress{height:3px;background:var(--accent);width:0;transition:width .1s linear;}

  .m-close{position:absolute;top:12px;right:14px;z-index:5;width:28px;height:28px;border-radius:50%;
    background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;color:#86868b;font-size:15px;cursor:pointer;}

  /* visual zone — compact illustration of just the relevant snippet */
  .viz{position:relative;height:188px;background:#0b0b0c;overflow:hidden;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .viz-inner{width:86%;}

  /* mini IG snippet pieces */
  .snip{background:#1c1c1e;border-radius:14px;padding:12px 14px;color:#fff;}
  .snip + .snip{margin-top:8px;}
  .snip-row{display:flex;align-items:center;gap:11px;color:#fff;}
  .snip-row .ic{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;}
  .snip-row .tx{flex:1;min-width:0;}
  .snip-row .tx .t{font-size:13.5px;font-weight:500;}
  .snip-row .tx .s{font-size:11px;color:var(--ig-sub);margin-top:1px;}
  .snip-row .chev{color:var(--ig-sub);font-size:14px;}
  .av{width:30px;height:30px;border-radius:50%;background:#3a3a3c;flex-shrink:0;}
  .bluebtn{background:#1877f2;color:#fff;border-radius:20px;text-align:center;padding:11px;font-size:13.5px;font-weight:600;}
  .white-snip{background:#fff;color:#111;border:1px solid #e6e6e6;}
  .white-snip .tx .t{color:#111;}
  .white-snip .tx .s{color:#777;}
  .pillval{font-size:11px;font-weight:700;color:var(--accent);margin-top:1px;}
  .chk{width:18px;height:18px;border-radius:5px;border:2px solid #555;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .chk.on{background:var(--accent);border-color:var(--accent);}
  .menudot{display:inline-flex;flex-direction:column;gap:3px;}
  .menudot i{width:17px;height:2px;background:#fff;border-radius:2px;display:block;}

  /* highlight ring */
  .hl{position:relative;}
  .hl::after{content:"";position:absolute;inset:-6px;border:2.5px solid var(--hi);border-radius:14px;
    pointer-events:none;animation:pulse 1.5s ease-in-out infinite;}
  .hl.round::after{border-radius:50%;inset:-5px;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,113,227,.4);opacity:1;}50%{box-shadow:0 0 0 8px rgba(0,113,227,0);opacity:.6;}}
  .finger{position:absolute;width:28px;height:28px;border-radius:50%;background:rgba(0,113,227,.2);
    border:2px solid var(--accent);animation:tap 1.5s ease-in-out infinite;z-index:6;}
  @keyframes tap{0%,100%{transform:scale(1);opacity:.9;}50%{transform:scale(.75);opacity:.5;}}

  /* text zone */
  .body{padding:18px 22px 16px;text-align:center;}
  .stepno{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:7px;}
  .body h2{font-size:18px;font-weight:650;letter-spacing:-.3px;color:#1d1d1f;margin-bottom:7px;line-height:1.25;}
  .body p{font-size:13px;color:#5b5b60;line-height:1.5;}
  .body p b{color:#1d1d1f;font-weight:650;}

  /* footer controls */
  .foot{display:flex;align-items:center;justify-content:space-between;padding:0 18px 18px;}
  .dots{display:flex;gap:5px;align-items:center;flex:1;justify-content:center;}
  .dots i{width:5px;height:5px;border-radius:50%;background:#d2d2d7;transition:all .25s;display:block;}
  .dots i.on{background:var(--accent);width:16px;border-radius:4px;}
  .navbtn{border:none;background:#f1f1f3;color:#1d1d1f;width:38px;height:38px;border-radius:50%;
    font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;}
  .navbtn:hover{background:#e6e6e9;}
  .navbtn:active{transform:scale(.93);}
  .navbtn.primary{background:var(--accent);color:#fff;}
  .navbtn:disabled{opacity:.35;cursor:default;}

  .external{display:flex;gap:12px;margin-top:4px;}
  .external button{border:none;background:#fff;color:#1d1d1f;font-size:14px;font-weight:600;
    padding:11px 18px;border-radius:13px;cursor:pointer;box-shadow:0 4px 16px -6px rgba(0,0,0,.25);}
  .external button:hover{background:#f2f2f4;}
</style>
</head>
<body>

<div class="head">
  <h1>Export tutorial — modal style</h1>
  <p>Compact squircle popover (~half screen) over a dimmed app backdrop. Each step shows just the snippet that matters. All data is generic — no real names, emails, usernames, or photos.</p>
</div>

<div class="phone">
  <div class="island"></div>
  <div class="screen">
    <!-- faint app behind -->
    <div class="app-faint">
      <div class="ttl">Get your<br>Instagram data</div>
      <div class="box"></div>
    </div>
    <div class="backdrop"></div>

    <!-- the modal -->
    <div class="modal">
      <div class="progress" id="progress"></div>
      <div class="m-close">✕</div>
      <div class="viz" id="viz"></div>
      <div class="body">
        <div class="stepno" id="stepno"></div>
        <h2 id="ttl"></h2>
        <p id="desc"></p>
      </div>
      <div class="foot">
        <button class="navbtn" id="prevBtn">‹</button>
        <div class="dots" id="dots"></div>
        <button class="navbtn primary" id="nextBtn">›</button>
      </div>
    </div>
  </div>
</div>

<div class="external">
  <button id="playBtn">▶ Auto-play</button>
  <button id="restartBtn">↻ Restart</button>
</div>

<script>
const ic={
  user:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg>',
  info:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h6M8 12h8M8 16h5"/></svg>',
  export:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 3h7v7M21 3l-9 9M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>',
  cal:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>',
  file:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg>',
  expand:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/></svg>',
  chk:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  dl:'<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
};

const TOTAL=13;
const steps=[
 {title:'Open your profile menu',
  desc:'On your Instagram profile, tap the <b>☰ menu</b> in the top-right corner.',
  viz:`<div class="viz-inner"><div class="snip" style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:15px;font-weight:700;">yourname ▾</span>
        <span style="display:flex;gap:14px;align-items:center;"><span style="color:#fff;">♡</span>
        <span class="menudot hl round"><i></i><i></i><i></i></span></span></div></div>`,
  finger:{top:'70px',right:'42px'}},

 {title:'Tap Settings and activity',
  desc:'In the menu that slides up, tap <b>Settings and activity</b> at the top.',
  viz:`<div class="viz-inner"><div class="snip-row snip hl">
        <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6a7 7 0 0 0 .1-1z"/></svg></span>
        <div class="tx"><div class="t">Settings and activity</div></div><span class="chev">›</span></div></div>`,
  finger:{top:'74px',left:'30px'}},

 {title:'Open Accounts Center',
  desc:'At the top of Settings, tap <b>Accounts Center</b>.',
  viz:`<div class="viz-inner"><div class="snip-row snip hl">
        <span class="ic">${ic.user}</span><div class="tx"><div class="t">Accounts Center</div>
        <div class="s">Password, security, personal details</div></div><span class="chev">›</span></div></div>`,
  finger:{top:'94px',left:'30px'}},

 {title:'Your information & permissions',
  desc:'In Accounts Center, tap <b>Your information and permissions</b>.',
  viz:`<div class="viz-inner"><div class="snip-row snip hl">
        <span class="ic">${ic.info}</span><div class="tx"><div class="t">Your information and permissions</div></div>
        <span class="chev">›</span></div></div>`,
  finger:{top:'94px',left:'30px'}},

 {title:'Export your information',
  desc:'Tap <b>Export your information</b>, then the blue <b>Create export</b> button on the next screen.',
  viz:`<div class="viz-inner">
        <div class="snip-row snip white-snip" style="margin-bottom:9px;"><div class="tx"><div class="t">Export your information</div></div><span class="ic" style="color:#111;">${ic.export}</span></div>
        <div class="bluebtn hl">Create export</div></div>`,
  finger:{top:'128px',left:'50%'}},

 {title:'Choose your profile',
  desc:'Select your <b>Instagram</b> profile from the list.',
  viz:`<div class="viz-inner">
        <div class="snip-row snip white-snip"><span class="av"></span><div class="tx"><div class="t">yourname</div><div class="s">Facebook</div></div></div>
        <div class="snip-row snip white-snip hl"><span class="av"></span><div class="tx"><div class="t">yourname</div><div class="s">Instagram</div></div><span class="chev">›</span></div>
       </div>`,
  finger:{top:'126px',left:'50%'}},

 {title:'Export to device',
  desc:'Choose <b>Export to device</b> so you get the .zip file directly.',
  viz:`<div class="viz-inner">
        <div class="snip-row snip white-snip hl"><div class="tx"><div class="t">Export to device</div></div><span class="chev">›</span></div>
        <div class="snip-row snip white-snip"><div class="tx"><div class="t">Export to external service</div></div><span class="chev">›</span></div>
       </div>`,
  finger:{top:'74px',left:'50%'}},

 {title:'This is the settings screen',
  desc:'You’ll land on <b>Confirm your export</b>. The next 3 steps each open one row here — <b>tap each</b>, set it, come back.',
  viz:`<div class="viz-inner" style="width:92%;">
        <div class="snip-row snip white-snip hl" style="padding:7px 11px;"><span class="ic" style="color:#111;">${ic.info}</span><div class="tx"><div class="t" style="font-size:12.5px;">Customize information</div></div><span class="chev">›</span></div>
        <div class="snip-row snip white-snip hl" style="padding:7px 11px;margin-top:5px;"><span class="ic" style="color:#111;">${ic.cal}</span><div class="tx"><div class="t" style="font-size:12.5px;">Date range</div></div><span class="chev">›</span></div>
        <div class="snip-row snip white-snip hl" style="padding:7px 11px;margin-top:5px;"><span class="ic" style="color:#111;">${ic.file}</span><div class="tx"><div class="t" style="font-size:12.5px;">Format</div></div><span class="chev">›</span></div>
        <div class="snip-row snip white-snip hl" style="padding:7px 11px;margin-top:5px;"><span class="ic" style="color:#111;">${ic.expand}</span><div class="tx"><div class="t" style="font-size:12.5px;">Media quality</div></div><span class="chev">›</span></div>
       </div>`,
  finger:null},

 {title:'Customize information',
  desc:'Open that row and check <b>only</b>: Followers & following, Likes, Comments, Story interactions. Leave everything else off.',
  viz:`<div class="viz-inner" style="width:92%;">
        <div class="snip-row snip white-snip" style="padding:7px 11px;"><span class="chk on">${ic.chk}</span><div class="tx"><div class="t" style="font-size:12.5px;">Followers and following</div></div></div>
        <div class="snip-row snip white-snip" style="padding:7px 11px;margin-top:5px;"><span class="chk on">${ic.chk}</span><div class="tx"><div class="t" style="font-size:12.5px;">Likes</div></div></div>
        <div class="snip-row snip white-snip" style="padding:7px 11px;margin-top:5px;"><span class="chk on">${ic.chk}</span><div class="tx"><div class="t" style="font-size:12.5px;">Comments &amp; Story interactions</div></div></div>
        <div class="snip-row snip white-snip" style="padding:7px 11px;margin-top:5px;opacity:.5;"><span class="chk"></span><div class="tx"><div class="t" style="font-size:12.5px;">Messages, posts, media…</div></div></div>
       </div>`,
  finger:null},

 {title:'Date range → All time',
  desc:'Open <b>Date range</b> and choose <b>All time</b>. Skipping this gives incomplete follower data.',
  viz:`<div class="viz-inner">
        <div class="snip-row snip white-snip hl" style="padding:9px 13px;"><span class="ic" style="color:#111;">${ic.cal}</span><div class="tx"><div class="t">Date range</div><div class="pillval">All time</div></div><span class="chev">›</span></div></div>`,
  finger:{top:'72px',right:'30px'}},

 {title:'Format → JSON · Quality → Lower',
  desc:'Set <b>Format</b> to <b>JSON</b> (required — HTML won’t work) and <b>Media quality</b> to <b>Lower</b> to keep the file small.',
  viz:`<div class="viz-inner">
        <div class="snip-row snip white-snip hl" style="padding:9px 13px;"><span class="ic" style="color:#111;">${ic.file}</span><div class="tx"><div class="t">Format</div><div class="pillval">JSON</div></div><span class="chev">›</span></div>
        <div class="snip-row snip white-snip hl" style="padding:9px 13px;margin-top:8px;"><span class="ic" style="color:#111;">${ic.expand}</span><div class="tx"><div class="t">Media quality</div><div class="pillval">Lower quality</div></div><span class="chev">›</span></div></div>`,
  finger:null},

 {title:'Start the export',
  desc:'Tap <b>Start export</b>. Instagram may ask you to re-enter your password — that’s normal security, not us.',
  viz:`<div class="viz-inner"><div class="bluebtn hl">Start export</div></div>`,
  finger:{top:'94px',left:'50%'}},

 {title:'Download, then upload here',
  desc:'Instagram emails you when it’s ready (minutes to a day). Download the <b>.zip</b> and drop it into YOUnfollowed — read <b>100% in your browser</b>, never uploaded.',
  viz:`<div class="viz-inner" style="text-align:center;">
        <div style="width:72px;height:72px;border-radius:50%;margin:0 auto;background:linear-gradient(135deg,#0071e3,#34a0ff);display:flex;align-items:center;justify-content:center;">${ic.dl}</div>
       </div>`,
  finger:null},
];

const viz=document.getElementById('viz');
const stepno=document.getElementById('stepno');
const ttl=document.getElementById('ttl');
const desc=document.getElementById('desc');
const progress=document.getElementById('progress');
const dotsWrap=document.getElementById('dots');
steps.forEach((_,i)=>{const d=document.createElement('i');if(!i)d.className='on';dotsWrap.appendChild(d);});

let cur=0,playing=false,timer=null,prog=null;
const STEP_MS=2800;

function fingerStyle(f){let c='';if(f.top)c+=`top:${f.top};`;if(f.bottom)c+=`bottom:${f.bottom};`;
  if(f.left){c+=`left:${f.left};`;if(f.left==='50%')c+='margin-left:-14px;';}if(f.right)c+=`right:${f.right};`;return c;}

function render(){
  const s=steps[cur];
  // fade viz
  viz.style.opacity=0;
  setTimeout(()=>{
    viz.innerHTML=s.viz+(s.finger?`<div class="finger" style="${fingerStyle(s.finger)}"></div>`:'');
    viz.style.opacity=1;
  },130);
  stepno.textContent=`Step ${cur+1} / ${TOTAL}`;
  ttl.textContent=s.title;
  desc.innerHTML=s.desc;
  [...dotsWrap.children].forEach((d,i)=>d.className=i===cur?'on':'');
  document.getElementById('prevBtn').disabled=cur===0;
}
viz.style.transition='opacity .2s ease';

function go(n){cur=Math.max(0,Math.min(steps.length-1,n));render();}
function next(){cur<steps.length-1?go(cur+1):stop();}
function prev(){go(cur-1);}

function startProgress(){let st=Date.now();clearInterval(prog);progress.style.width='0%';
  prog=setInterval(()=>{progress.style.width=Math.min(100,(Date.now()-st)/STEP_MS*100)+'%';},50);}
function play(){playing=true;document.getElementById('playBtn').textContent='⏸ Pause';if(cur===steps.length-1)go(0);tick();}
function tick(){startProgress();clearTimeout(timer);timer=setTimeout(()=>{cur<steps.length-1?(next(),tick()):stop();},STEP_MS);}
function stop(){playing=false;document.getElementById('playBtn').textContent='▶ Auto-play';clearTimeout(timer);clearInterval(prog);progress.style.width='0%';}

document.getElementById('nextBtn').onclick=()=>{stop();next();};
document.getElementById('prevBtn').onclick=()=>{stop();prev();};
document.getElementById('playBtn').onclick=()=>{playing?stop():play();};
document.getElementById('restartBtn').onclick=()=>{stop();go(0);};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){stop();next();}if(e.key==='ArrowLeft'){stop();prev();}if(e.key===' '){e.preventDefault();playing?stop():play();}});
render();
</script>
</body>
</html>
